<!doctype html>
<html>
  <head>
    <title>Lab 4 CSS</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      h2 {
        color: green;
        text-align: center;
      }

      .internal-para {
        color: purple;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <h1 style="color: red; text-align: center">Inline CSS Heading</h1>

    <p style="color: blue; font-size: 20px">
      This paragraph is styled using Inline CSS.
    </p>

    <h2>Internal CSS Sub Heading</h2>

    <p class="internal-para">This paragraph is styled using Internal CSS.</p>

    <h3>External CSS Heading</h3>

    <p class="external-para">This paragraph is styled using External CSS.</p>

    <a href="lab4.html">Go to Lab 4</a>
  </body>
</html>
