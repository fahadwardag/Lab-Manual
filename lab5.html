<!doctype html>
<html>
  <head>
    <title>Experiment 5: CSS Selectors</title>

    <style>
      /* Element Selector */
      h1,
      h2 {
        color: blue;
      }

      p {
        color: green;
      }

      /* Class Selector */
      .highlight {
        background-color: yellow;
        font-style: italic;
      }

      /* ID Selector */
      #main-title {
        color: navy;
        text-decoration: underline;
      }

      /* Grouping Selector */
      h2,
      p,
      li {
        border: 1px solid black;
        padding: 5px;
      }

      /* Descendant Selector */
      div p {
        background-color: lightgray;
      }

      /* Child Selector */
      div > ul > li {
        color: purple;
      }

      /* Attribute Selector */
      input[type="text"] {
        background-color: lightyellow;
      }

      input[type="password"] {
        background-color: lightpink;
      }

      /* Pseudo Classes */
      a:hover {
        color: red;
      }

      ul li:first-child {
        font-weight: bold;
      }

      ul li:last-child {
        color: orange;
      }

      /* Pseudo Elements */
      h2::before {
        content: "★ ";
      }

      h2::after {
        content: " ★";
      }

      p::first-letter {
        font-size: 24px;
        color: red;
      }

      /* Image Styling */
      img {
        border: 2px solid black;
        width: 200px;
      }
    </style>
  </head>

  <body>
    <h1 id="main-title">Experiment 5: CSS Selectors</h1>

    <p class="highlight">This paragraph is styled with a class selector.</p>

    <p>This is a normal paragraph demonstrating an element selector.</p>

    <h2>CSS Selector Examples</h2>

    <div>
      <p>This paragraph is inside a div and uses a descendant selector.</p>

      <ul>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
      </ul>
    </div>
    <img src="car.jpg" alt="Sample Image" />

    <br /><br />

    <input type="text" placeholder="Enter your name" />
    <input type="password" placeholder="Enter password" />

    <br /><br />

    <a href="lab2.html">Back to Homepage</a>
  </body>
</html>
